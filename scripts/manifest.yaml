# Sign-in scripts: ZenmoFeiShi/chavyleung/Yuheng mirrored or synced by Actions.
# Full author repos: scripts/author-repos.yaml + download-author-repos.py

scripts:
  - name: PingMe-capture
    file: PingMe-capture.js
    note: "抓参 — 对齐 quanx/cook.js，存 #pingme_capture_v3，Egern 专用"
  - name: PingMe-signin
    file: PingMe-signin.js
    note: "签到 — 镜像 oo226/quanx PingMe.js，读 #pingme_capture_v3"
  - name: PingMe
    file: PingMe.js
    note: "ZenmoFeiShi 多账号合一版（QX）；Egern 请用 capture+signin 拆分脚本"
    cron: "30 8,20 * * *"
    timeout: 300
    type: http_request
    match: ^https://api\.pingmeapp\.net/app/queryBalanceAndBonus
    note: "ZenmoFeiShi/Qx 全仓库镜像"

  - name: iios
    file: iios_checkin.js
    mirror_from: zenmofeishi/iios_checkin.js
    cron: "30 8,20 * * *"
    timeout: 60

  - name: 一点万象
    file: mixc_signin.js
    mirror_from: zenmofeishi/mixc_signin.js
    cron: "1 0 * * *"
    timeout: 60

  - name: NodeSeek
    file: Nodeseek_NsCheckin.js
    mirror_from: zenmofeishi/Nodeseek_NsCheckin.js
    cron: "1 0 * * *"
    timeout: 60

  - name: 来充
    file: LaiChong.js
    mirror_from: zenmofeishi/LaiChong.js
    cron: "50 9 * * *"
    timeout: 60

  - name: Soul唱歌
    file: SoulSing.js
    mirror_from: zenmofeishi/SoulSing.js
    cron: "50 9 * * *"
    timeout: 60

  - name: 岁乐游
    file: SLY.js
    mirror_from: zenmofeishi/SLY.js
    cron: "1 0 * * *"
    timeout: 60

  - name: 起点读书
    file: qdreader.js
    upstream: https://raw.githubusercontent.com/Yuheng0101/X/main/Tasks/QDReader/qdreader.js
    cron: "11 2 * * *"
    timeout: 60
    note: "起点读书 Yuheng0101/X；上游发布为压缩混淆单行版（~550KB），属正常"

  - name: 电信营业厅
    file: dianxin10000.js
    upstream: https://raw.githubusercontent.com/chavyleung/scripts/master/10000/10000.js
    cron: "0 8 * * *"
    timeout: 60

  - name: 贴吧
    file: tieba.js
    upstream: https://raw.githubusercontent.com/chavyleung/scripts/master/tieba/tieba.js
    cron: "0 8 * * *"
    timeout: 60

  - name: 顺丰
    file: sfexpress.js
    upstream: https://raw.githubusercontent.com/chavyleung/scripts/master/sfexpress/sfexpress.js
    cron: "0 9 * * *"
    timeout: 60

  - name: 网易严选
    file: yanxuan.js
    upstream: https://raw.githubusercontent.com/chavyleung/scripts/master/yanxuan/yanxuan.js
    cron: "0 8 * * *"
    timeout: 60

  - name: 喜马拉雅
    file: ximalaya.js
    upstream: https://raw.githubusercontent.com/chavyleung/scripts/master/ximalaya/ximalaya.js
    cron: "0 8 * * *"
    timeout: 60
