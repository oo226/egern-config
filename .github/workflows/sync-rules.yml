name: Sync Egern Rules

# Runs on GitHub cloud — no local PC needed.
# Schedule: every day 11:00 Beijing time (03:00 UTC).

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-rules
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Download Repcz rules
        run: |
          set -euo pipefail
          mkdir -p Rules/skk
          RULES=(
            Reject ChinaDomain Lan Direct
            WeChat Bilibili AppleCN ChinaIP ChinaASN
            AI Telegram Twitter TikTok
            YouTube Netflix Disney Spotify Emby
            Google Github Microsoft AppleServers
            Game ProxyGFW Proxy
          )
          BASE="https://raw.githubusercontent.com/Repcz/Tool/X/Egern/Rules"
          MIRROR="https://ghproxy.net/https://raw.githubusercontent.com/Repcz/Tool/X/Egern/Rules"
          for name in "${RULES[@]}"; do
            if ! curl -fsSL "${BASE}/${name}.yaml" -o "Rules/${name}.yaml"; then
              curl -fsSL "${MIRROR}/${name}.yaml" -o "Rules/${name}.yaml"
            fi
            echo "synced ${name}.yaml"
          done
          if ! curl -fsSL "https://ruleset.skk.moe/List/domainset/reject.conf" -o "Rules/skk/reject.conf"; then
            curl -fsSL "https://ghproxy.net/https://ruleset.skk.moe/List/domainset/reject.conf" -o "Rules/skk/reject.conf"
          fi

      - name: Merge China direct rules
        run: python scripts/merge-china-rules.py

      - name: Merge ad reject rules
        run: python scripts/merge-reject-rules.py

      - name: Sync sign-in scripts
        run: python scripts/download-scripts.py

      - name: Merge adblock modules
        run: python scripts/merge-adblock-modules.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Rules/ scripts/*.js Modules/adblock-collection.module Modules/manifest.yaml
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "chore: sync rules, merge China-Direct, update scripts"
          git push
