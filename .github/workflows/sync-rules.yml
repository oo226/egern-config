name: Sync Egern Rules

# sync branch: daily upstream mirror + merge (factory)
# main branch: curated publish only — see publish/manifest.yaml

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-rules
  cancel-in-progress: true

env:
  SYNC_BRANCH: sync

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SYNC_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure sync branch
        run: |
          git fetch origin main ${{ env.SYNC_BRANCH }} || true
          git checkout ${{ env.SYNC_BRANCH }} || git checkout -b ${{ env.SYNC_BRANCH }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Download upstream rules
        run: |
          set -euo pipefail
          mkdir -p Routing/_upstream/skk Routing/Foreign
          MERGE=(
            Reject Direct WeChat Bilibili AppleCN ChinaDomain ChinaIP ChinaASN
          )
          FOREIGN=(
            AI Telegram Twitter TikTok
            YouTube Netflix Disney Spotify Emby
            Google Github Microsoft AppleServers
            Game ProxyGFW Proxy
          )
          BASE="https://raw.githubusercontent.com/Repcz/Tool/X/Egern/Rules"
          MIRROR="https://ghproxy.net/https://raw.githubusercontent.com/Repcz/Tool/X/Egern/Rules"
          for name in "${MERGE[@]}"; do
            if ! curl -fsSL "${BASE}/${name}.yaml" -o "Routing/_upstream/${name}.yaml"; then
              curl -fsSL "${MIRROR}/${name}.yaml" -o "Routing/_upstream/${name}.yaml"
            fi
            echo "synced upstream ${name}.yaml"
          done
          if ! curl -fsSL "${BASE}/Lan.yaml" -o "Routing/Lan.yaml"; then
            curl -fsSL "${MIRROR}/Lan.yaml" -o "Routing/Lan.yaml"
          fi
          for name in "${FOREIGN[@]}"; do
            if ! curl -fsSL "${BASE}/${name}.yaml" -o "Routing/Foreign/${name}.yaml"; then
              curl -fsSL "${MIRROR}/${name}.yaml" -o "Routing/Foreign/${name}.yaml"
            fi
            echo "synced foreign ${name}.yaml"
          done
          if ! curl -fsSL "https://ruleset.skk.moe/List/domainset/reject.conf" -o "Routing/_upstream/skk/reject.conf"; then
            curl -fsSL "https://ghproxy.net/https://ruleset.skk.moe/List/domainset/reject.conf" -o "Routing/_upstream/skk/reject.conf"
          fi
          mkdir -p Routing/_upstream/ai
          if ! curl -fsSL "https://cdn.jsdelivr.net/gh/VPSDance/ai-proxy-rules@main/rules/egern/all.yaml" -o "Routing/_upstream/ai/vpsdance-all.yaml"; then
            curl -fsSL "https://ghproxy.net/https://cdn.jsdelivr.net/gh/VPSDance/ai-proxy-rules@main/rules/egern/all.yaml" -o "Routing/_upstream/ai/vpsdance-all.yaml"
          fi
          if ! curl -fsSL "https://ruleset.skk.moe/List/non_ip/ai.conf" -o "Routing/_upstream/skk/ai.conf"; then
            curl -fsSL "https://ghproxy.net/https://ruleset.skk.moe/List/non_ip/ai.conf" -o "Routing/_upstream/skk/ai.conf"
          fi

      - name: Merge routing rules
        run: |
          python3 scripts/download-routing-supplements.py
          python scripts/merge-china-rules.py
          python scripts/merge-reject-rules.py
          python scripts/merge-ai-rules.py
          python3 scripts/convert-app-rules.py
          python3 scripts/publish-unbreak-rules.py
          python3 scripts/publish-direct-priority.py
          python3 scripts/mirror-semporia-icons.py

      - name: Mirror author repositories (full-repo)
        run: |
          python3 scripts/download-author-repos.py
          python3 scripts/download-iringo-modules.py
          python3 scripts/generate-unlock-supplements.py
          python3 scripts/generate-author-collection-supplements.py
          python3 scripts/sync-yu9191-boxjs.py
          python3 scripts/sync-egern-boxjs.py

      - name: Mirror chxm1023/ddm1023 scripts
        run: python3 scripts/download-chxm1023-scripts.py

      - name: Sync sign-in scripts
        run: python3 scripts/download-scripts.py

      - name: Merge adblock module
        run: python scripts/merge-adblock-modules.py

      - name: Merge unlock module
        run: python scripts/merge-adblock-modules.py Modules/unlock-manifest.yaml

      - name: Merge cookie capture module
        run: python scripts/merge-adblock-modules.py Modules/cookie-manifest.yaml

      - name: Mirror external module scripts and rewrite collections
        run: python3 scripts/mirror-external-scripts.py

      - name: Mirror GeoIP databases
        run: python3 scripts/mirror-geoip.py

      - name: Mirror IBL3ND widgets
        run: python3 scripts/download-ibl3nd-widgets.py

      - name: Commit sync branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes on sync branch."
          else
            git commit -m "chore: sync upstream on sync branch"
            git push origin ${{ env.SYNC_BRANCH }}
          fi

      - name: Publish curated snapshot to main
        run: python3 scripts/publish-main.py
