# 规则名称: Gemini
# 说明: Gemini App / Gemini Web 关键域名（避免被 Google.yaml 兜底策略接管）
#
# 设计目标：
# - 分流：命中该规则集的一律走 ChatGPT/AI 策略组（由面板手动选日本/美国等）
# - DNS：在 Egern.yaml 的 dns.forward 中单独映射到 国外 上游，规避国内 DNS 污染
#
# 备注：此规则集刻意包含部分 Gemini 依赖的 googleapis 端点，避免仅凭 DOMAIN-KEYWORD google 落到 Google.yaml。

no_resolve: true

domain_set:
  # Gemini web/app core
  - gemini.google.com
  - generativelanguage.googleapis.com

  # Gemini app observed endpoints (from user connection logs)
  - signaler-pa.googleapis.com
  - oauthaccountmanager.googleapis.com
  - play.googleapis.com

  # Common Gemini / AI Studio / NotebookLM endpoints (from upstream AI lists)
  - ai.google.dev
  - aida.googleapis.com
  - aisandbox-pa.googleapis.com
  - cloudcode-pa.googleapis.com
  - daily-cloudcode-pa.googleapis.com
  - geller-pa.googleapis.com
  - jules.google.com
  - proactivebackend-pa.googleapis.com
  - robinfrontend-pa.googleapis.com
  - notebooklm.googleapis.com
  - notebooklm-pa.googleapis.com

  # Auth/token paths often used by Google apps
  - oauth2.googleapis.com
  - securetoken.googleapis.com
  - identitytoolkit.googleapis.com

domain_suffix_set:
  - gemini.google
  - gemini.gstatic.com
  - generativeai.google
  - aistudio.google.com
  - makersuite.google.com
  - clients6.google.com
  - deepmind.google
  - deepmind.com

