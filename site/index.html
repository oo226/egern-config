<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>egern-config 模块中心</title>
  <meta name="description" content="oo226/egern-config main 分支稳定内容 — 模块、分流、BoxJS、脚本、小组件一键添加">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="googlebot" content="noindex, nofollow">
  <meta name="theme-color" content="#6c8cff">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <script>
    (function () {
      var saved = localStorage.getItem('egern-hub-theme');
      var light = saved === 'light' || (!saved && window.matchMedia('(prefers-color-scheme: light)').matches);
      if (light) document.documentElement.dataset.theme = 'light';
    })();
  </script>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <button class="theme-toggle" id="theme-toggle" type="button" title="切换主题" aria-label="切换主题">
        <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
      <h1>⚡ egern-config 模块中心</h1>
      <p>仅展示 <strong>main</strong> 分支稳定内容 — 点击即可添加模块，或复制 raw 链接</p>
      <div class="notice">本站内容为个人镜像整理，仅供学习交流与个人设备使用。详见 <a href="disclaimer.html">免责声明</a>。</div>
      <span class="badge" id="updated">加载中…</span>
    </div>
  </header>

  <div class="health-banner" id="health-banner" hidden></div>

  <div class="toolbar">
    <input class="search" id="search" type="search" placeholder="搜索名称、说明、标签…" autocomplete="off">
    <div class="presets" id="presets"></div>
    <div class="filters" id="filters"></div>
  </div>

  <main>
    <div id="extras"></div>
    <div class="stats" id="stats"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" hidden>没有匹配的项目</div>
  </main>

  <footer>
    <p>
      数据源：<a href="https://github.com/oo226/egern-config/tree/main">oo226/egern-config</a> ·
      主配置：<a id="main-config-link" href="#">Egern.yaml</a> ·
      <a href="https://github.com/oo226/egern-config/blob/main/USAGE.md">USAGE.md</a> ·
      <a href="disclaimer.html">免责声明</a>
    </p>
    <p style="margin-top:.4rem">模块：<code>egern:///modules/new?url=…</code> · 分流/脚本请复制 raw 链接 · 可「添加到主屏幕」当快捷入口</p>
  </footer>

  <div class="toast" id="toast">已复制</div>

  <div class="modal-overlay" id="qr-modal" hidden>
    <div class="modal">
      <h3 id="qr-title">二维码</h3>
      <img id="qr-image" alt="QR code" width="200" height="200">
      <div class="modal-actions">
        <button class="btn" type="button" id="qr-copy">复制链接</button>
        <button class="btn" type="button" id="qr-close">关闭</button>
      </div>
    </div>
  </div>

  <script>
    const CATEGORY_ICONS = { config: '⚙️', modules: '🧩', routing: '🔀', boxjs: '📦', scripts: '📅', widgets: '📱' };
    let catalog = null;
    let activeCategory = 'all';
    let activePreset = 'all';
    let activeBoxjsGroup = 'all';
    let highlightId = null;
    let qrCurrentUrl = '';

    const $ = (sel) => document.querySelector(sel);

    function showQr(url, title) {
      qrCurrentUrl = url;
      $('#qr-title').textContent = title || '扫码导入';
      $('#qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;
      $('#qr-modal').hidden = false;
    }

    $('#qr-close').onclick = () => { $('#qr-modal').hidden = true; };
    $('#qr-modal').onclick = (e) => { if (e.target.id === 'qr-modal') $('#qr-modal').hidden = true; };
    $('#qr-copy').onclick = () => copyText(qrCurrentUrl);

    async function shareItem(item) {
      const url = item.share_url || `${location.origin}${location.pathname}#id=${item.id}`;
      const text = `${item.name} — egern-config 模块中心`;
      if (navigator.share) {
        try {
          await navigator.share({ title: item.name, text, url });
          return;
        } catch (_) {}
      }
      await copyText(url);
      showToast('分享链接已复制');
    }

    function parseHashId() {
      const m = location.hash.match(/^#id=(.+)$/);
      return m ? decodeURIComponent(m[1]) : null;
    }

    function focusItemById(id) {
      if (!id) return;
      highlightId = id;
      activeCategory = 'all';
      activePreset = 'all';
      $('#search').value = '';
      document.querySelectorAll('#filters .filter-btn, #presets .filter-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.cat === 'all' || b.dataset.preset === 'all');
      });
      renderExtras();
      renderGrid();
      requestAnimationFrame(() => {
        const el = document.querySelector(`[data-item-id="${CSS.escape(id)}"]`);
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          el.classList.add('highlight');
          setTimeout(() => el.classList.remove('highlight'), 3200);
        }
      });
    }

    function showToast(msg) {
      const t = $('#toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast('已复制到剪贴板');
      } catch {
        showToast('复制失败，请手动复制');
      }
    }

    function primaryAction(item) {
      if (item.kind === 'module') {
        return { label: '添加到 Egern', href: item.add_url };
      }
      if (item.kind === 'boxjs-app') {
        return { label: '打开 BoxJS', href: item.add_url };
      }
      if (item.kind === 'config') {
        return { label: '复制订阅链接', onclick: () => copyText(item.url) };
      }
      return { label: '复制 raw 链接', onclick: () => copyText(item.url) };
    }

    function renderPresets(presets) {
      const el = $('#presets');
      el.innerHTML = '';
      const all = document.createElement('button');
      all.className = 'filter-btn active';
      all.dataset.preset = 'all';
      all.textContent = '全部预设';
      all.onclick = () => setPreset('all');
      el.appendChild(all);
      for (const p of presets || []) {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (p.id === 'daily' ? ' preset-daily' : '');
        btn.dataset.preset = p.id;
        btn.textContent = `${p.icon || ''} ${p.name} (${p.count})`;
        btn.onclick = () => setPreset(p.id);
        el.appendChild(btn);
      }
    }

    function renderFilters(categories) {
      const el = $('#filters');
      el.innerHTML = '';
      const all = document.createElement('button');
      all.className = 'filter-btn active';
      all.dataset.cat = 'all';
      all.textContent = '全部分类';
      all.onclick = () => setCategory('all');
      el.appendChild(all);
      for (const c of categories) {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.cat = c.id;
        btn.textContent = `${c.icon || CATEGORY_ICONS[c.id] || ''} ${c.name} (${c.count})`;
        btn.onclick = () => setCategory(c.id);
        el.appendChild(btn);
      }
    }

    function renderBoxjsGroups(items) {
      let bar = document.getElementById('boxjs-groups');
      if (activeCategory !== 'boxjs') {
        if (bar) bar.remove();
        activeBoxjsGroup = 'all';
        return;
      }
      const groups = [...new Set(items.filter(i => i.kind === 'boxjs-app').map(i => i.group).filter(Boolean))].sort();
      if (!bar) {
        bar = document.createElement('div');
        bar.id = 'boxjs-groups';
        bar.className = 'presets';
        bar.style.marginBottom = '0.75rem';
        $('#stats').after(bar);
      }
      bar.innerHTML = '';
      const mk = (id, label) => {
        const b = document.createElement('button');
        b.className = 'filter-btn' + (activeBoxjsGroup === id ? ' active' : '');
        b.textContent = label;
        b.onclick = () => { activeBoxjsGroup = id; renderGrid(); renderBoxjsGroups(catalog.items); };
        bar.appendChild(b);
      };
      mk('all', 'BoxJS 全部分组');
      for (const g of groups) mk(g, g);
    }

    function isBrowsingAll() {
      const q = $('#search').value.trim();
      return !q && activeCategory === 'all' && activePreset === 'all';
    }

    function renderExtras() {
      const el = $('#extras');
      el.innerHTML = '';
      if (!isBrowsingAll() || !catalog) return;

      if (catalog.quick_start?.length) {
        const sec = document.createElement('section');
        sec.className = 'quick-section';
        sec.innerHTML = '<div class="section-title">🚀 快速入口</div>';
        const grid = document.createElement('div');
        grid.className = 'quick-grid';
        for (const q of catalog.quick_start) {
          const wrap = document.createElement('div');
          wrap.style.display = 'contents';
          const a = document.createElement('a');
          a.className = 'quick-chip';
          if (q.kind === 'module') {
            a.href = q.add_url;
            a.target = '_blank';
          } else {
            a.href = '#';
            a.onclick = (e) => { e.preventDefault(); copyText(q.url); };
          }
          a.innerHTML = `<strong>${q.name}</strong><small>${q.desc || '点击添加'}</small>`;
          wrap.appendChild(a);
          grid.appendChild(wrap);
        }
        const qrRow = document.createElement('div');
        qrRow.style.gridColumn = '1 / -1';
        qrRow.style.display = 'flex';
        qrRow.style.gap = '0.45rem';
        qrRow.style.flexWrap = 'wrap';
        qrRow.style.marginTop = '0.35rem';
        const egernCfg = catalog.quick_start.find(q => q.id === 'egern-main');
        const boxjsSub = catalog.quick_start.find(q => q.id === 'egern-boxjs');
        if (egernCfg) {
          const b = document.createElement('button');
          b.className = 'btn';
          b.textContent = '📱 主配置二维码';
          b.onclick = () => showQr(egernCfg.url, 'Egern.yaml');
          qrRow.appendChild(b);
        }
        if (boxjsSub) {
          const b = document.createElement('button');
          b.className = 'btn';
          b.textContent = '📱 BoxJS 订阅二维码';
          b.onclick = () => showQr(boxjsSub.url, 'BoxJS 订阅');
          qrRow.appendChild(b);
        }
        sec.appendChild(grid);
        if (qrRow.childElementCount) sec.appendChild(qrRow);
        el.appendChild(sec);
      }

      if (catalog.onboarding?.length) {
        const sec = document.createElement('section');
        sec.className = 'quick-section';
        sec.innerHTML = '<div class="section-title">🧭 新手引导</div>';
        const ol = document.createElement('ol');
        ol.className = 'onboarding-steps';
        for (const step of catalog.onboarding) {
          const li = document.createElement('li');
          li.innerHTML = `<strong>${step.title}</strong> — ${step.desc || ''}`;
          if (step.add_url) {
            const a = document.createElement('a');
            a.href = step.add_url;
            a.target = '_blank';
            a.textContent = ' 一键添加';
            a.style.marginLeft = '0.35rem';
            li.appendChild(a);
          } else if (step.url) {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.style.marginLeft = '0.35rem';
            btn.style.padding = '0.2rem 0.5rem';
            btn.style.fontSize = '0.75rem';
            btn.textContent = '复制链接';
            btn.onclick = () => copyText(step.url);
            li.appendChild(btn);
          }
          ol.appendChild(li);
        }
        sec.appendChild(ol);
        el.appendChild(sec);
      }

      if (catalog.signin_bundle) {
        const b = catalog.signin_bundle;
        const sec = document.createElement('section');
        sec.className = 'bundle-section';
        sec.innerHTML = '<div class="section-title">📅 签到脚本包</div>';
        const row = document.createElement('div');
        row.className = 'bundle-row';
        const scripts = (b.scripts || []).join('、');
        row.innerHTML = `<div class="bundle-info"><strong>${b.name}</strong><p>${b.desc || ''}${scripts ? `<br>包含：${scripts}` : ''}</p></div>`;
        const copyYaml = document.createElement('button');
        copyYaml.className = 'btn btn-primary';
        copyYaml.textContent = '复制 scriptings YAML';
        copyYaml.onclick = () => copyText(b.scripting_yaml);
        row.appendChild(copyYaml);
        sec.appendChild(row);
        el.appendChild(sec);
      }

      if (catalog.sync_digest?.summary?.length) {
        const d = catalog.sync_digest;
        const sec = document.createElement('section');
        sec.className = 'changelog-section';
        const commit = d.commit;
        const title = commit
          ? `📊 同步摘要 · ${commit.date} <code style="font-size:0.78rem">${commit.hash}</code>`
          : '📊 同步摘要';
        sec.innerHTML = `<div class="section-title">${title}</div>`;
        if (commit?.subject) {
          const p = document.createElement('p');
          p.style.cssText = 'font-size:0.82rem;color:var(--muted);margin-bottom:0.35rem';
          p.textContent = commit.subject;
          sec.appendChild(p);
        }
        const ul = document.createElement('ul');
        ul.className = 'digest-list';
        for (const line of d.summary) {
          const li = document.createElement('li');
          li.textContent = line;
          ul.appendChild(li);
        }
        sec.appendChild(ul);
        el.appendChild(sec);
      }

      if (catalog.featured_boxjs?.length) {
        const sec = document.createElement('section');
        sec.className = 'quick-section';
        sec.innerHTML = '<div class="section-title">⭐ BoxJS 常用应用</div>';
        const grid = document.createElement('div');
        grid.className = 'featured-boxjs-grid';
        for (const app of catalog.featured_boxjs) {
          const a = document.createElement('a');
          a.className = 'quick-chip';
          a.href = app.add_url;
          a.target = '_blank';
          a.innerHTML = `<strong>${app.name}</strong><small>${app.group || 'BoxJS'}</small>`;
          grid.appendChild(a);
        }
        sec.appendChild(grid);
        el.appendChild(sec);
      }

      if (catalog.bundles?.length) {
        const sec = document.createElement('section');
        sec.className = 'bundle-section';
        sec.innerHTML = '<div class="section-title">📦 模块套装</div>';
        for (const b of catalog.bundles) {
          const row = document.createElement('div');
          row.className = 'bundle-row';
          row.innerHTML = `<div class="bundle-info"><strong>${b.name}</strong><p>${b.desc || ''}</p></div>`;
          const addFirst = document.createElement('a');
          addFirst.className = 'btn btn-primary';
          addFirst.textContent = '添加 MITM';
          addFirst.href = b.add_urls?.[0] || '#';
          addFirst.target = '_blank';
          const copyYaml = document.createElement('button');
          copyYaml.className = 'btn';
          copyYaml.textContent = '复制 modules YAML';
          copyYaml.onclick = () => copyText(b.modules_yaml);
          const copyUrls = document.createElement('button');
          copyUrls.className = 'btn';
          copyUrls.textContent = '复制全部链接';
          copyUrls.onclick = () => copyText((b.add_urls || []).join('\n'));
          row.append(addFirst, copyYaml, copyUrls);
          sec.appendChild(row);
        }
        el.appendChild(sec);
      }

      const uh = catalog.upstream_health;
      if (uh && uh.checked) {
        const sec = document.createElement('section');
        sec.className = 'changelog-section';
        const ok = uh.fail === 0;
        sec.innerHTML = `<div class="section-title">🔗 上游脚本检测 · ${uh.ok}/${uh.checked} 可用${uh.truncated ? '（抽样）' : ''}</div>`;
        if (!ok && uh.broken?.length) {
          const warn = document.createElement('div');
          warn.className = 'health-warn';
          warn.innerHTML = `<strong>${uh.fail} 个上游脚本链接异常</strong>（模块内 script-path，每日 sync 检测）<ul>${uh.broken.map(b => `<li>${b.url}</li>`).join('')}</ul>`;
          sec.appendChild(warn);
        } else if (ok) {
          sec.innerHTML += '<p style="font-size:0.82rem;color:var(--muted);margin-top:0.35rem">已检测的模块外部脚本链接均可访问。</p>';
        }
        el.appendChild(sec);
      }

      if (catalog.changelog?.length) {
        const sec = document.createElement('section');
        sec.className = 'changelog-section';
        const head = document.createElement('div');
        head.className = 'collapsible-head section-title';
        head.innerHTML = '<span>📝 最近更新（main）</span><span id="changelog-arrow">▼</span>';
        const body = document.createElement('div');
        body.className = 'collapsible-body';
        body.hidden = true;
        const ul = document.createElement('ul');
        ul.className = 'changelog-list';
        for (const c of catalog.changelog) {
          const li = document.createElement('li');
          li.innerHTML = `<code>${c.date}</code> ${c.subject} <code>${c.hash}</code>`;
          ul.appendChild(li);
        }
        body.appendChild(ul);
        head.onclick = () => {
          body.hidden = !body.hidden;
          document.getElementById('changelog-arrow').textContent = body.hidden ? '▼' : '▲';
        };
        sec.append(head, body);
        el.appendChild(sec);
      }
    }

    function setPreset(id) {
      activePreset = id;
      document.querySelectorAll('#presets .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.preset === id));
      renderExtras();
      renderGrid();
    }

    function setCategory(cat) {
      activeCategory = cat;
      document.querySelectorAll('#filters .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
      renderBoxjsGroups(catalog?.items || []);
      renderExtras();
      renderGrid();
    }

    function matches(item, q) {
      if (activeCategory !== 'all' && item.category !== activeCategory) return false;
      if (activePreset !== 'all' && item.usage_tier !== activePreset) return false;
      if (activeCategory === 'boxjs' && activeBoxjsGroup !== 'all' && item.kind === 'boxjs-app' && item.group !== activeBoxjsGroup) return false;
      if (!q) return true;
      const hay = [item.name, item.desc, item.group, item.path, item.hint, ...(item.tags || [])].join(' ').toLowerCase();
      return hay.includes(q);
    }

    function renderCard(item) {
      const card = document.createElement('article');
      card.className = 'card';
      card.dataset.itemId = item.id;

      const head = document.createElement('div');
      head.className = 'card-head';
      if (item.icon) {
        const img = document.createElement('img');
        img.className = 'icon';
        img.src = item.icon;
        img.alt = '';
        img.loading = 'lazy';
        img.onerror = () => { img.replaceWith(iconPlaceholder(item)); };
        head.appendChild(img);
      } else {
        head.appendChild(iconPlaceholder(item));
      }

      const info = document.createElement('div');
      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = item.name;
      const meta = document.createElement('div');
      meta.className = 'card-meta';
      meta.textContent = [item.group, item.kind, item.usage_tier === 'daily' ? '默认开启' : item.usage_tier === 'optional' ? '按需开启' : ''].filter(Boolean).join(' · ');
      info.append(title, meta);
      head.appendChild(info);
      card.appendChild(head);

      if (item.desc) {
        const desc = document.createElement('div');
        desc.className = 'card-desc';
        desc.textContent = item.desc;
        card.appendChild(desc);
      }

      if (item.hint) {
        const hint = document.createElement('div');
        hint.className = 'card-hint';
        hint.textContent = item.hint;
        card.appendChild(hint);
      }

      const tags = document.createElement('div');
      tags.className = 'tags';
      if (item.usage_tier === 'daily') {
        const span = document.createElement('span');
        span.className = 'tag on';
        span.textContent = '默认开启';
        tags.appendChild(span);
      } else if (item.usage_tier === 'optional') {
        const span = document.createElement('span');
        span.className = 'tag opt';
        span.textContent = '按需开启';
        tags.appendChild(span);
      }
      if (item.featured) {
        const span = document.createElement('span');
        span.className = 'tag star';
        span.textContent = '常用';
        tags.appendChild(span);
      }
      if (item.health === 'fail') {
        const span = document.createElement('span');
        span.className = 'tag bad';
        span.textContent = '链接异常';
        tags.appendChild(span);
      }
      for (const t of (item.tags || []).slice(0, 5)) {
        const span = document.createElement('span');
        span.className = 'tag';
        span.textContent = t;
        tags.appendChild(span);
      }
      if (tags.childElementCount) card.appendChild(tags);

      const actions = document.createElement('div');
      actions.className = 'actions';
      const primary = primaryAction(item);
      const mainBtn = document.createElement(primary.href ? 'a' : 'button');
      mainBtn.className = 'btn btn-primary';
      mainBtn.textContent = primary.label;
      if (primary.href) {
        mainBtn.href = primary.href;
        if (item.kind === 'module') mainBtn.target = '_blank';
      } else {
        mainBtn.onclick = primary.onclick;
      }
      actions.appendChild(mainBtn);

      const copyBtn = document.createElement('button');
      copyBtn.className = 'btn';
      copyBtn.textContent = '复制链接';
      copyBtn.onclick = () => copyText(item.url);
      actions.appendChild(copyBtn);

      const shareBtn = document.createElement('button');
      shareBtn.className = 'btn';
      shareBtn.textContent = '分享';
      shareBtn.onclick = () => shareItem(item);
      actions.appendChild(shareBtn);

      if (['config', 'boxjs'].includes(item.kind) || item.id === 'egern-boxjs') {
        const qrBtn = document.createElement('button');
        qrBtn.className = 'btn';
        qrBtn.textContent = '二维码';
        qrBtn.onclick = () => showQr(item.url, item.name);
        actions.appendChild(qrBtn);
      }

      if (item.scripting_yaml) {
        const yamlBtn = document.createElement('button');
        yamlBtn.className = 'btn';
        yamlBtn.textContent = '复制 YAML';
        yamlBtn.onclick = () => copyText(item.scripting_yaml);
        actions.appendChild(yamlBtn);
      }

      if (item.homepage) {
        const home = document.createElement('a');
        home.className = 'btn';
        home.textContent = '主页';
        home.href = item.homepage;
        home.target = '_blank';
        actions.appendChild(home);
      }

      card.appendChild(actions);
      return card;
    }

    function iconPlaceholder(item) {
      const div = document.createElement('div');
      div.className = 'icon-placeholder';
      div.textContent = CATEGORY_ICONS[item.category] || '📄';
      return div;
    }

    function renderGrid() {
      const q = $('#search').value.trim().toLowerCase();
      renderExtras();
      const items = (catalog?.items || []).filter(i => matches(i, q));
      $('#grid').innerHTML = '';
      $('#empty').hidden = items.length > 0;
      $('#stats').textContent = `显示 ${items.length} / ${catalog?.total || 0} 项`;
      for (const item of items) $('#grid').appendChild(renderCard(item));
    }

    async function loadCatalog() {
      const bases = ['', 'https://cdn.jsdelivr.net/gh/oo226/egern-config@main/site/', 'https://raw.githubusercontent.com/oo226/egern-config/refs/heads/main/site/'];
      for (const base of bases) {
        try {
          const res = await fetch(`${base}catalog.json`);
          if (res.ok) return res.json();
        } catch (_) {}
      }
      throw new Error('catalog load failed');
    }

    function renderHealthBanner() {
      const el = $('#health-banner');
      if (!catalog) { el.hidden = true; return; }
      const localBroken = (catalog.items || []).filter(i => i.health === 'fail');
      const upstreamBroken = catalog.upstream_health?.broken || [];
      const localFail = localBroken.length;
      const upstreamFail = catalog.upstream_health?.fail || 0;
      if (!localFail && !upstreamFail) {
        el.hidden = true;
        el.innerHTML = '';
        return;
      }
      el.hidden = false;
      const parts = [];
      if (localFail) parts.push(`${localFail} 个本地 raw 链接异常`);
      if (upstreamFail) parts.push(`${upstreamFail} 个上游脚本链接异常`);
      let html = `<div class="health-warn"><strong>⚠️ 链接健康告警</strong> — ${parts.join('，')}（每日 sync 检测）`;
      if (localBroken.length) {
        html += `<ul>${localBroken.slice(0, 8).map(i => `<li>${i.name} — ${i.url}</li>`).join('')}</ul>`;
      }
      if (upstreamBroken.length && !localBroken.length) {
        html += `<ul>${upstreamBroken.slice(0, 5).map(b => `<li>${b.url}</li>`).join('')}</ul>`;
      }
      html += '</div>';
      el.innerHTML = html;
    }

    function initTheme() {
      const btn = $('#theme-toggle');
      const applyMeta = () => {
        const light = document.documentElement.dataset.theme === 'light';
        document.querySelector('meta[name="theme-color"]').content = light ? '#4a6cf7' : '#6c8cff';
      };
      applyMeta();
      btn.onclick = () => {
        const light = document.documentElement.dataset.theme === 'light';
        const next = light ? 'dark' : 'light';
        if (next === 'light') document.documentElement.dataset.theme = 'light';
        else delete document.documentElement.dataset.theme;
        localStorage.setItem('egern-hub-theme', next);
        applyMeta();
      };
    }

    async function init() {
      initTheme();
      try {
        catalog = await loadCatalog();
      } catch {
        $('#stats').textContent = '加载 catalog.json 失败';
        return;
      }
      $('#updated').textContent = `main · 更新于 ${catalog.generated_at?.slice(0, 10) || '未知'} · ${catalog.total} 项`;
      const cfg = catalog.items?.find(i => i.id === 'egern-main');
      if (cfg) {
        const a = $('#main-config-link');
        a.href = cfg.url;
      }
      renderPresets(catalog.presets);
      renderFilters(catalog.categories || []);
      renderBoxjsGroups(catalog.items);
      renderHealthBanner();
      renderExtras();
      renderGrid();
      const hashId = parseHashId();
      if (hashId) focusItemById(hashId);
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      }
    }

    $('#search').addEventListener('input', renderGrid);
    window.addEventListener('hashchange', () => focusItemById(parseHashId()));
    init();
  </script>
</body>
</html>
