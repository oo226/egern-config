<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>egern-config 模块中心</title>
  <meta name="description" content="oo226/egern-config main 分支稳定内容 — 模块、分流、BoxJS、脚本、小组件一键添加">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242836;
      --border: #2e3345;
      --text: #e8eaed;
      --muted: #9aa0b4;
      --accent: #6c8cff;
      --accent2: #4fd1a4;
      --warn: #f0b429;
      --radius: 12px;
      --shadow: 0 8px 32px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    .hero {
      background: linear-gradient(135deg, #1a1d27 0%, #12151f 50%, #0f1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 2rem 1.25rem 1.5rem;
    }
    .hero-inner { max-width: 1100px; margin: 0 auto; }
    .hero h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -.02em; }
    .hero p { color: var(--muted); margin-top: .4rem; font-size: .95rem; }
    .badge {
      display: inline-block;
      background: rgba(108,140,255,.15);
      color: var(--accent);
      font-size: .75rem;
      padding: .2rem .55rem;
      border-radius: 999px;
      margin-top: .75rem;
      border: 1px solid rgba(108,140,255,.25);
    }
    .toolbar {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: .75rem;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(15,17,23,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .search {
      flex: 1;
      min-width: 200px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .65rem 1rem;
      color: var(--text);
      font-size: .95rem;
      outline: none;
    }
    .search:focus { border-color: var(--accent); }
    .filters { display: flex; flex-wrap: wrap; gap: .4rem; }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: .45rem .85rem;
      border-radius: 999px;
      font-size: .82rem;
      cursor: pointer;
      transition: .15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active {
      background: rgba(108,140,255,.18);
      border-color: var(--accent);
      color: var(--accent);
    }
    main { max-width: 1100px; margin: 0 auto; padding: 1.25rem; }
    .stats { color: var(--muted); font-size: .85rem; margin-bottom: 1rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: .65rem;
      transition: border-color .15s, transform .15s;
    }
    .card:hover { border-color: #3d4460; transform: translateY(-1px); }
    .card-head { display: flex; gap: .75rem; align-items: flex-start; }
    .icon {
      width: 44px; height: 44px; border-radius: 10px;
      background: var(--surface2); object-fit: cover; flex-shrink: 0;
    }
    .icon-placeholder {
      width: 44px; height: 44px; border-radius: 10px;
      background: var(--surface2); display: grid; place-items: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .card-title { font-weight: 600; font-size: .98rem; line-height: 1.3; }
    .card-meta { font-size: .78rem; color: var(--muted); margin-top: .15rem; }
    .card-desc {
      font-size: .84rem; color: var(--muted);
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .tags { display: flex; flex-wrap: wrap; gap: .3rem; }
    .tag {
      font-size: .7rem; padding: .15rem .45rem; border-radius: 6px;
      background: var(--surface2); color: var(--muted);
    }
    .tag.on { background: rgba(79,209,164,.15); color: var(--accent2); }
    .actions { display: flex; flex-wrap: wrap; gap: .45rem; margin-top: auto; padding-top: .25rem; }
    .btn {
      font-size: .8rem; padding: .45rem .75rem; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text); cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: .3rem;
      transition: .15s;
    }
    .btn:hover { border-color: var(--accent); }
    .btn-primary {
      background: rgba(108,140,255,.2);
      border-color: rgba(108,140,255,.45);
      color: #b8c8ff;
    }
    .btn-primary:hover { background: rgba(108,140,255,.32); }
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border);
      padding: .65rem 1.1rem; border-radius: var(--radius);
      box-shadow: var(--shadow); font-size: .85rem; opacity: 0;
      pointer-events: none; transition: opacity .2s; z-index: 100;
    }
    .toast.show { opacity: 1; }
    .empty { text-align: center; color: var(--muted); padding: 3rem 1rem; }
    footer {
      max-width: 1100px; margin: 2rem auto; padding: 1rem 1.25rem 2rem;
      color: var(--muted); font-size: .8rem; border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); }
    @media (max-width: 640px) {
      .hero h1 { font-size: 1.4rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <h1>⚡ egern-config 模块中心</h1>
      <p>仅展示 <strong>main</strong> 分支稳定内容 — 点击即可添加模块，或复制 raw 链接</p>
      <span class="badge" id="updated">加载中…</span>
    </div>
  </header>

  <div class="toolbar">
    <input class="search" id="search" type="search" placeholder="搜索名称、说明、标签…" autocomplete="off">
    <div class="filters" id="filters"></div>
  </div>

  <main>
    <div class="stats" id="stats"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" hidden>没有匹配的项目</div>
  </main>

  <footer>
    <p>
      数据源：<a href="https://github.com/oo226/egern-config/tree/main">oo226/egern-config</a> ·
      主配置导入：<a id="main-config-link" href="#">Egern.yaml</a> ·
      <a href="https://github.com/oo226/egern-config/blob/main/USAGE.md">USAGE.md</a>
    </p>
      <p style="margin-top:.4rem">模块添加链接格式：<code>egern:///modules/new?url=…</code> · 分流规则 / 脚本请在 Egern 配置中手动引用 raw URL · 由 GitHub Actions 自动部署</p>
  </footer>

  <div class="toast" id="toast">已复制</div>

  <script>
    const CATEGORY_ICONS = { config: '⚙️', modules: '🧩', routing: '🔀', boxjs: '📦', scripts: '📅', widgets: '📱' };
    let catalog = null;
    let activeCategory = 'all';

    const $ = (sel) => document.querySelector(sel);

    function showToast(msg) {
      const t = $('#toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast('已复制到剪贴板');
      } catch {
        showToast('复制失败，请手动复制');
      }
    }

    function primaryAction(item) {
      if (item.kind === 'module') {
        return { label: '添加到 Egern', href: item.add_url, primary: true };
      }
      if (item.kind === 'boxjs-app') {
        return { label: '打开 BoxJS', href: item.add_url, primary: true };
      }
      if (item.kind === 'config') {
        return { label: '复制订阅链接', onclick: () => copyText(item.url), primary: true };
      }
      return { label: '复制 raw 链接', onclick: () => copyText(item.url), primary: true };
    }

    function renderFilters(categories) {
      const el = $('#filters');
      el.innerHTML = '';
      const all = document.createElement('button');
      all.className = 'filter-btn active';
      all.dataset.cat = 'all';
      all.textContent = '全部';
      all.onclick = () => setCategory('all');
      el.appendChild(all);
      for (const c of categories) {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.cat = c.id;
        btn.textContent = `${c.icon || CATEGORY_ICONS[c.id] || ''} ${c.name} (${c.count})`;
        btn.onclick = () => setCategory(c.id);
        el.appendChild(btn);
      }
    }

    function setCategory(cat) {
      activeCategory = cat;
      document.querySelectorAll('.filter-btn').forEach((b) => {
        b.classList.toggle('active', b.dataset.cat === cat);
      });
      renderGrid();
    }

    function matches(item, q) {
      if (activeCategory !== 'all' && item.category !== activeCategory) return false;
      if (!q) return true;
      const hay = [item.name, item.desc, item.group, item.path, ...(item.tags || [])].join(' ').toLowerCase();
      return hay.includes(q);
    }

    function renderCard(item) {
      const card = document.createElement('article');
      card.className = 'card';

      const head = document.createElement('div');
      head.className = 'card-head';
      if (item.icon) {
        const img = document.createElement('img');
        img.className = 'icon';
        img.src = item.icon;
        img.alt = '';
        img.loading = 'lazy';
        img.onerror = () => { img.replaceWith(iconPlaceholder(item)); };
        head.appendChild(img);
      } else {
        head.appendChild(iconPlaceholder(item));
      }

      const info = document.createElement('div');
      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = item.name;
      const meta = document.createElement('div');
      meta.className = 'card-meta';
      meta.textContent = [item.group, item.kind].filter(Boolean).join(' · ');
      info.append(title, meta);
      head.appendChild(info);
      card.appendChild(head);

      if (item.desc) {
        const desc = document.createElement('div');
        desc.className = 'card-desc';
        desc.textContent = item.desc;
        card.appendChild(desc);
      }

      if (item.tags?.length) {
        const tags = document.createElement('div');
        tags.className = 'tags';
        for (const t of item.tags.slice(0, 6)) {
          const span = document.createElement('span');
          span.className = 'tag' + (t.includes('默认') ? ' on' : '');
          span.textContent = t;
          tags.appendChild(span);
        }
        if (item.default_enabled === true) {
          const span = document.createElement('span');
          span.className = 'tag on';
          span.textContent = 'Egern 默认开';
          tags.appendChild(span);
        }
        card.appendChild(tags);
      }

      const actions = document.createElement('div');
      actions.className = 'actions';
      const primary = primaryAction(item);
      const mainBtn = document.createElement(primary.href ? 'a' : 'button');
      mainBtn.className = 'btn btn-primary';
      mainBtn.textContent = primary.label;
      if (primary.href) {
        mainBtn.href = primary.href;
        if (item.kind === 'module') mainBtn.target = '_blank';
      } else {
        mainBtn.onclick = primary.onclick;
      }
      actions.appendChild(mainBtn);

      const copyBtn = document.createElement('button');
      copyBtn.className = 'btn';
      copyBtn.textContent = '复制链接';
      copyBtn.onclick = () => copyText(item.url);
      actions.appendChild(copyBtn);

      if (item.homepage) {
        const home = document.createElement('a');
        home.className = 'btn';
        home.textContent = '主页';
        home.href = item.homepage;
        home.target = '_blank';
        actions.appendChild(home);
      }

      card.appendChild(actions);
      return card;
    }

    function iconPlaceholder(item) {
      const div = document.createElement('div');
      div.className = 'icon-placeholder';
      div.textContent = CATEGORY_ICONS[item.category] || '📄';
      return div;
    }

    function renderGrid() {
      const q = $('#search').value.trim().toLowerCase();
      const items = (catalog?.items || []).filter((i) => matches(i, q));
      const grid = $('#grid');
      grid.innerHTML = '';
      $('#empty').hidden = items.length > 0;
      $('#stats').textContent = `显示 ${items.length} / ${catalog?.total || 0} 项`;
      for (const item of items) grid.appendChild(renderCard(item));
    }

    async function init() {
      try {
        const res = await fetch('catalog.json');
        catalog = await res.json();
      } catch (e) {
        $('#stats').textContent = '加载 catalog.json 失败';
        return;
      }
      $('#updated').textContent = `main · 更新于 ${catalog.generated_at?.slice(0, 10) || '未知'} · ${catalog.total} 项`;
      const cfg = catalog.items?.find((i) => i.id === 'egern-main');
      if (cfg) {
        const a = $('#main-config-link');
        a.href = cfg.url;
        a.textContent = 'Egern.yaml';
      }
      renderFilters(catalog.categories || []);
      renderGrid();
    }

    $('#search').addEventListener('input', renderGrid);
    init();
  </script>
</body>
</html>
