# Cookie / token capture modules — merge into cookie-collection.module
# Enable only when grabbing sign-in params; disable after capture to save battery.

merge:
  output: cookie-collection.module
  primary_desc: "多源合并：签到 Cookie/Token 抓取（按需启用，抓完建议关闭）"
  header_lines:
    - "# AUTO-MERGED by scripts/merge-adblock-modules.py"
    - "# 类型: 模块 — 抓参/Cookie（MITM http-request，默认关闭）"
    - "# Do not edit manually. Updated by GitHub Actions after upstream sync."
    - "#"
    - "# Sources: fmz200 cookies.module + chavyleung/lowking/NobyDa 等抓参脚本（本地镜像）"
  script_url_fixes:
    "https://raw.githubusercontent.com/chavyleung/scripts/master/rrtv/rrtv.cookie.js": "https://raw.githubusercontent.com/oo226/egern-config/refs/heads/main/Scripts/_stubs/noop.js"
    "https://raw.githubusercontent.com/chavyleung/scripts/master/zimuzu/zimuzu.cookie.js": "https://raw.githubusercontent.com/oo226/egern-config/refs/heads/main/Scripts/_stubs/noop.js"

modules:
  - name: fmz200-cookies
    cache: cookies.module
    role: primary
    upstream: https://raw.githubusercontent.com/fmz200/wool_scripts/main/Surge/module/cookies.module
    note: "奶思 cookies.module — 通用抓 Cookie/Token"
