# Unlock / utility modules merged into unlock-collection.module
# One URL for Egern: Modules/unlock-collection.module

merge:
  output: unlock-collection.module
  primary_desc: "多源合并去重：跳过代理检测 + 链接解锁 + Spotify + VIP解锁 + 屏蔽更新（Actions 每日同步）"
  header_lines:
    - "# AUTO-MERGED by scripts/merge-adblock-modules.py"
    - "# 类型: 模块 — 解锁/增强（链接解锁、Spotify、跳过代理检测、屏蔽更新等）"
    - "# Do not edit manually. Updated by GitHub Actions after upstream sync."
    - "#"
    - "# Sources: mieqq, QingRex(可莉), chxm1023/ddm1023, Yu9191, miranquil, iEwha, ddgksf2013, WeiGiegie, liul0ng, local patches"
    - ""

modules:
  - name: mieqq-skip-proxy
    cache: mieqq-skip-proxy.sgmodule
    role: primary
    upstream: https://raw.githubusercontent.com/mieqq/mieqq/master/skip-proxy-lists.sgmodule
    note: "mieqq — 跳过国内 App 代理检测"

  - name: qingrex-unlock
    cache: qingrex-unlock.sgmodule
    role: supplement
    local: true
    note: "QingRex/可莉 — 全仓库解锁/HTTPDNS/Spotify 等（自动生成）"

  - name: fmz200-unlock-extra
    cache: fmz200-unlock-extra.sgmodule
    role: supplement
    local: true
    note: "奶思 — HTTPDNS 等解锁补充（自动生成）"

  - name: miranquil-qq-unlock
    cache: miranquil-qq.sgmodule
    role: supplement
    upstream: https://raw.githubusercontent.com/miranquil/surge-scripts/main/tencent/c-pc-page/module.sgmodule
    note: "miranquil — QQ 非官方/禁止访问页解锁"

  - name: iewha-unlock
    cache: iewha-unlock.sgmodule
    role: supplement
    upstream: https://raw.githubusercontent.com/iEwha/Profiles/master/Surge/Unlock.sgmodule
    note: "iEwha — 多 App VIP/订阅解锁脚本合集"

  - name: iewha-script
    cache: iewha-script.sgmodule
    role: supplement
    upstream: https://raw.githubusercontent.com/iEwha/Profiles/master/Surge/Script.sgmodule
    note: "iEwha — iOS 更新屏蔽、QUIC 屏蔽、B站换区等"

  - name: chxm1023-collections
    cache: chxm1023-Collections.sgmodule
    role: supplement
    upstream: https://raw.githubusercontent.com/chxm1023/Script_X/main/Collections.sgmodule
    note: "ddm1023/chxm1023 — App解锁合集（彩云/扫描王/Emby/百度网盘等，2026-04 更新）"

  - name: yu9191-shortcutstudio
    cache: yu9191-ShortcutStudio.sgmodule
    role: supplement
    upstream: https://raw.githubusercontent.com/Yu9191/shortcutstudio-rewrite/refs/heads/baby/modules/ShortcutStudio.sgmodule
    note: "Yu9191 — ShortcutStudio 全仓库（脚本已镜像）"

  - name: yu9191-rewrite-unlock
