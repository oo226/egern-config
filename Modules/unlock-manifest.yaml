# Unlock / utility modules merged into unlock-collection.module
# One URL for Egern: Modules/unlock-collection.module

merge:
  output: unlock-collection.module
  primary_desc: "多源合并去重：跳过代理检测 + 链接解锁 + Spotify + VIP解锁 + 屏蔽更新（Actions 每日同步）"
  header_lines:
    - "# AUTO-MERGED by scripts/merge-adblock-modules.py"
    - "# 类型: 模块 — 解锁/增强（链接解锁、Spotify、跳过代理检测、屏蔽更新等）"
    - "# Do not edit manually. Updated by GitHub Actions after upstream sync."
    - "#"
    - "# Sources: mieqq, QingRex/LoonKissSurge(可莉系), miranquil, iEwha, local patches"
    - ""

modules:
  - name: mieqq-skip-proxy
    cache: mieqq-skip-proxy.sgmodule
    role: primary
    upstream: https://raw.githubusercontent.com/mieqq/mieqq/master/skip-proxy-lists.sgmodule
    note: "mieqq — 跳过国内 App 代理检测"

  - name: qingrex-httpdns
    cache: qingrex-httpdns.sgmodule
    role: supplement
    upstream: https://raw.githubusercontent.com/QingRex/LoonKissSurge/refs/heads/main/Surge/Beta/%E6%8B%A6%E6%88%AAHTTPDNS.beta.sgmodule
    note: "QingRex/可莉系 — 拦截 HTTPDNS"

  - name: qingrex-wechat-unlock
    cache: qingrex-wechat-unlock.sgmodule
    role: supplement
    upstream: https://raw.githubusercontent.com/QingRex/LoonKissSurge/refs/heads/main/Surge/Beta/%E5%BE%AE%E4%BF%A1%E5%A4%96%E9%83%A8%E9%93%BE%E6%8E%A5%E8%A7%A3%E9%94%81.beta.sgmodule
    note: "QingRex/可莉系 + zZPiglet — 微信外部链接解锁"

  - name: miranquil-qq-unlock
    cache: miranquil-qq.sgmodule
    role: supplement
    upstream: https://raw.githubusercontent.com/miranquil/surge-scripts/main/tencent/c-pc-page/module.sgmodule
    note: "miranquil — QQ 非官方/禁止访问页解锁"

  - name: qingrex-spotify
    cache: qingrex-spotify-beta.sgmodule
    role: supplement
    upstream: https://raw.githubusercontent.com/QingRex/LoonKissSurge/refs/heads/main/Surge/Beta/Spotify%E5%8E%BB%E5%B9%BF%E5%91%8A.beta.sgmodule
    note: "QingRex/可莉系 + 001ProMax — Spotify 去广告（脚本走 hub.kelee.one，Build 2026/4/19）"

  - name: iewha-unlock
    cache: iewha-unlock.sgmodule
    role: supplement
    upstream: https://raw.githubusercontent.com/iEwha/Profiles/master/Surge/Unlock.sgmodule
    note: "iEwha — 多 App VIP/订阅解锁脚本合集"

  - name: iewha-script
    cache: iewha-script.sgmodule
    role: supplement
    upstream: https://raw.githubusercontent.com/iEwha/Profiles/master/Surge/Script.sgmodule
    note: "iEwha — iOS 更新屏蔽、QUIC 屏蔽、B站换区等"

  - name: patches-unlock
    cache: patches-unlock.sgmodule
    role: supplement
    local: true
    note: "本仓库 — P12/OCSP 屏蔽、系统更新屏蔽、skip-server-cert-verify"
