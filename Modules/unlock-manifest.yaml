    role: supplement
    local: true
    note: "Yu9191/Rewrite — sgmodule 解锁合集（幻宇星球等，脚本已镜像）"

  - name: weigiegie-unlock
    cache: weigiegie-unlock.sgmodule
    role: supplement
    local: true
    note: "WeiGiegie/666 全仓库解锁（自动生成）"

  - name: liul0ng-unlock
    cache: liul0ng-unlock.sgmodule
    role: supplement
    local: true
    note: "liul0ng/quanx 全仓库解锁（自动生成）"

  - name: patches-alicloud
    cache: patches-alicloud.sgmodule
    role: supplement
    local: true
