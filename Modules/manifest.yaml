# Mirrored ad-block sources, merged & deduplicated by Actions.
# Output: Modules/adblock-collection.module

merge:
  output: adblock-collection.module

modules:
  - name: fmz200-blockAds
    cache: fmz200-blockAds.module
    role: primary
    upstream: https://raw.githubusercontent.com/fmz200/wool_scripts/main/Surge/module/blockAds.module
    note: "奶思 blockAds — App/小程序净化 + 去开屏 (~730 款)"

  - name: blackmatrix7-Advertising
    cache: blackmatrix7-Advertising.sgmodule
    role: supplement
    upstream: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rewrite/Surge/Advertising/Advertising.sgmodule
    note: "blackmatrix7 去广告 URL Rewrite + MITM"

  - name: blackmatrix7-AdvertisingScript
    cache: blackmatrix7-AdvertisingScript.sgmodule
    role: supplement
    upstream: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rewrite/Surge/AdvertisingScript/AdvertisingScript.sgmodule
    note: "blackmatrix7 开屏 Script + 补充 Rule"

  - name: custom-apps
    cache: custom-apps.sgmodule
    role: supplement
    local: true
    note: "本仓库 — 银行/税务/NB助手 NBToolAds 补全"
