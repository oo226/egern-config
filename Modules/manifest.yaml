modules:
  - name: fmz200-blockAds
    cache: fmz200-blockAds.module
    role: primary
    upstream: https://raw.githubusercontent.com/fmz200/wool_scripts/main/Surge/module/blockAds.module
    note: "奶思 blockAds — App/小程序净化 + 去开屏 (~730 款)"

  - name: blackmatrix7-Advertising
    cache: blackmatrix7-Advertising.sgmodule
    role: supplement
    upstream: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rewrite/Surge/Advertising/Advertising.sgmodule
    note: "blackmatrix7 去广告 URL Rewrite + MITM"

  - name: blackmatrix7-AdvertisingScript
    cache: blackmatrix7-AdvertisingScript.sgmodule
    role: supplement
    upstream: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rewrite/Surge/AdvertisingScript/AdvertisingScript.sgmodule
    note: "blackmatrix7 开屏 Script + 补充 Rule"

  - name: custom-apps
    cache: custom-apps.sgmodule
    role: supplement
    local: true
    note: "本仓库 — 银行/税务/NB助手 NBToolAds 补全"

  - name: limbopro-web-ads
    cache: limbopro-Adblock4limbo.sgmodule
    role: supplement
    upstream: https://raw.githubusercontent.com/limbopro/Adblock4limbo/main/Adblock4limbo.sgmodule
    note: "毒奶 网页去广告 (2026 仍活跃更新)"

  - name: chxm1023-AppAd
    cache: chxm1023-AppAd.sgmodule
    role: supplement
    upstream: https://raw.githubusercontent.com/chxm1023/Advertising/Shadowrocket/AppAd.sgmodule
    note: "ddm1023/chxm1023 — App/小程序开屏去广告补充"

  - name: qingrex-adblock
    cache: qingrex-adblock.sgmodule
    role: supplement
    local: true
    note: "QingRex/可莉 — 全仓库去广告模块合并去重（自动生成）"

  - name: fmz200-extra
    cache: fmz200-extra.sgmodule
    role: supplement
    local: true
    note: "奶思 — 全仓库单 App 模块补充（blockAds 之外的合并去重）"

  - name: chxm1023-ad-supplement
    cache: chxm1023-ad-supplement.sgmodule
    role: supplement
    local: true
    note: "ddm1023 — YouTube/555电影/小红书等 Advertising 仓库补充"

  - name: tencent-sports-adblock
    cache: TencentSportsAdBlock.sgmodule
    role: supplement
    upstream: https://raw.githubusercontent.com/Hey-sayiwanna/TencentSports-Surge/main/TencentSportsAdBlock.sgmodule
    note: "腾讯体育去广告"
