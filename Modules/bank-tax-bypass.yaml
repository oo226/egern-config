# 税务 / 邮储隧道豁免（Egern YAML 模块）
# - 仅含「无开屏广告依赖、且易被代理影响」的域名
# - 动卡空间 / 农商等需要去开屏的 App：不要写进 bypass（会废模块去广告）
# - 对这些主机：MITM / 脚本去广告通常不生效（税务本就无广告）

name: 税务邮储隧道豁免
description: >
  电子税务局 + 邮储手机银行：bypass_tunnel_proxy + 真实 IP + DIRECT。
  不含动卡空间/农商等要去开屏的 App。若仍提示关 VPN，用该 App 时临时关 Egern。
author: oo226
homepage: https://github.com/oo226/egern-config

bypass_tunnel_proxy:
  # 电子税务局
  - "*.chinatax.gov.cn"
  - "chinatax.gov.cn"
  - "etax.chinatax.gov.cn"
  # 邮储手机银行（沿用原主配置豁免）
  - "login-service.mobile-bank.psbc.com"
  - "mobile-bank.psbc.com"
  - "static.mobile-bank.psbc.com"
  - "static.psbc.com"
  - "mcc.psbc.com"
  - "d.psbc.com"
  - "*.psbc.com"

real_ip_domains:
  - "*.chinatax.gov.cn"
  - "chinatax.gov.cn"
  - "etax.chinatax.gov.cn"
  - "*.psbc.com"
  - "mobile-bank.psbc.com"

rules:
  - domain_suffix:
      match: chinatax.gov.cn
      policy: DIRECT
  - domain_suffix:
      match: psbc.com
      policy: DIRECT
